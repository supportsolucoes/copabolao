<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Bolão Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --verde:#009c3b; --amarelo:#ffdf00; --azul:#002776;
    --branco:#ffffff; --cinza-bg:#f5f6fa; --cinza-borda:#e0e3ee;
    --texto:#1a1a2e; --texto-sec:#6b7280; --radius:10px; --radius-lg:16px;
    --vermelho:#dc2626; --laranja:#f59e0b;
  }
  body { font-family:'Barlow',sans-serif; background:var(--cinza-bg); color:var(--texto); min-height:100vh; }

  /* LOGIN */
  .login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
  .login-box { background:var(--branco); border-radius:var(--radius-lg); padding:2.5rem 2rem; max-width:380px; width:100%; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,.1); }
  .login-logo { font-size:3rem; margin-bottom:.5rem; }
  .login-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--azul); letter-spacing:2px; margin-bottom:.25rem; }
  .login-sub { font-size:.85rem; color:var(--texto-sec); margin-bottom:1.5rem; }
  .login-input { width:100%; padding:.75rem 1rem; border:1px solid var(--cinza-borda); border-radius:var(--radius); font-family:'Barlow',sans-serif; font-size:1rem; outline:none; margin-bottom:.75rem; text-align:center; letter-spacing:3px; }
  .login-input:focus { border-color:var(--azul); }
  .login-btn { width:100%; background:var(--azul); color:white; border:none; border-radius:var(--radius); padding:.85rem; font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:2px; cursor:pointer; }
  .login-btn:hover { opacity:.9; }
  .login-erro { color:var(--vermelho); font-size:.82rem; margin-top:.5rem; display:none; }

  /* ADMIN */
  .admin-screen { display:none; }
  .topbar { background:var(--azul); padding:.85rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar-title { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--amarelo); letter-spacing:2px; display:flex; align-items:center; gap:8px; }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .btn-sair { background:rgba(255,255,255,.15); border:none; color:white; border-radius:var(--radius); padding:5px 12px; font-family:'Barlow',sans-serif; font-size:.82rem; cursor:pointer; display:flex; align-items:center; gap:5px; }
  .btn-sair:hover { background:rgba(255,255,255,.25); }
  .btn-atualizar { background:var(--verde); border:none; color:white; border-radius:var(--radius); padding:5px 12px; font-family:'Barlow',sans-serif; font-size:.82rem; cursor:pointer; display:flex; align-items:center; gap:5px; }

  .admin-body { padding:1.25rem; max-width:900px; margin:0 auto; }

  /* CARDS RESUMO */
  .resumo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:1.25rem; }
  .resumo-card { background:var(--branco); border:1px solid var(--cinza-borda); border-radius:var(--radius-lg); padding:1.1rem; text-align:center; }
  .resumo-card-val { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:1px; line-height:1; }
  .resumo-card-lbl { font-size:.72rem; color:var(--texto-sec); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }
  .val-verde { color:var(--verde); }
  .val-azul { color:var(--azul); }
  .val-laranja { color:var(--laranja); }

  /* TABS */
  .tabs { display:flex; gap:8px; margin-bottom:1rem; border-bottom:1px solid var(--cinza-borda); padding-bottom:0; overflow-x:auto; }
  .tab { padding:.6rem 1rem; font-size:.85rem; font-weight:600; color:var(--texto-sec); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all .15s; }
  .tab.ativo { color:var(--azul); border-bottom-color:var(--azul); }

  /* SEÇÃO RESULTADO */
  .resultado-card { background:var(--branco); border:1px solid var(--cinza-borda); border-radius:var(--radius-lg); padding:1.25rem; margin-bottom:1rem; }
  .resultado-title { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--azul); letter-spacing:1px; margin-bottom:1rem; display:flex; align-items:center; gap:8px; }
  .resultado-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px; margin-bottom:1rem; }
  .resultado-time { text-align:center; font-weight:600; font-size:.9rem; }
  .resultado-inputs { display:flex; align-items:center; gap:8px; }
  .res-input { width:52px; height:52px; text-align:center; font-size:1.4rem; font-family:'Bebas Neue',sans-serif; color:var(--azul); border:2px solid var(--cinza-borda); border-radius:var(--radius); background:var(--cinza-bg); outline:none; }
  .res-input:focus { border-color:var(--azul); }
  .res-sep { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--texto-sec); }
  .btn-salvar-resultado { background:var(--verde); color:white; border:none; border-radius:var(--radius); padding:.7rem 1.5rem; font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:1.5px; cursor:pointer; display:flex; align-items:center; gap:6px; }
  .btn-salvar-resultado:hover { opacity:.9; }
  .resultado-atual { font-size:.82rem; color:var(--texto-sec); margin-top:.5rem; }

  /* TABELA PALPITES */
  .tabela-card { background:var(--branco); border:1px solid var(--cinza-borda); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:1rem; }
  .tabela-header { display:grid; grid-template-columns:1fr 1fr 80px 100px 100px; gap:8px; padding:.65rem 1rem; background:var(--azul); font-size:.75rem; font-weight:600; color:rgba(255,255,255,.85); text-transform:uppercase; letter-spacing:.5px; }
  .tabela-linha { display:grid; grid-template-columns:1fr 1fr 80px 100px 100px; gap:8px; padding:.65rem 1rem; border-bottom:1px solid var(--cinza-borda); font-size:.84rem; align-items:center; }
  .tabela-linha:last-child { border-bottom:none; }
  .tabela-linha:hover { background:var(--cinza-bg); }
  .badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:.72rem; font-weight:600; }
  .badge-pendente { background:#fff8e1; color:#7a5800; }
  .badge-confirmado { background:#f0fdf4; color:#15803d; }
  .badge-nao { background:#fef2f2; color:#991b1b; }
  .placar-badge { font-family:'Bebas Neue',sans-serif; font-size:.95rem; color:var(--azul); background:var(--cinza-bg); border-radius:6px; padding:1px 8px; letter-spacing:1px; }
  .btn-confirmar-pgto { background:var(--verde); color:white; border:none; border-radius:6px; padding:3px 10px; font-size:.75rem; cursor:pointer; font-family:'Barlow',sans-serif; font-weight:600; }
  .btn-confirmar-pgto:hover { opacity:.85; }
  .btn-estornar { background:#fee2e2; color:var(--vermelho); border:none; border-radius:6px; padding:3px 10px; font-size:.75rem; cursor:pointer; font-family:'Barlow',sans-serif; font-weight:600; }
  .tabela-vazio { padding:2rem; text-align:center; color:var(--texto-sec); font-size:.85rem; }

  /* RANKING */
  .ranking-card { background:var(--branco); border:1px solid var(--cinza-borda); border-radius:var(--radius-lg); padding:1.25rem; margin-bottom:1rem; }
  .ranking-title { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--azul); letter-spacing:1px; margin-bottom:1rem; display:flex; align-items:center; gap:8px; }
  .ranking-item { display:flex; align-items:center; gap:10px; padding:.6rem .75rem; border-radius:var(--radius); margin-bottom:6px; }
  .ranking-item:nth-child(1) { background:#fff8e1; border:1px solid #f5c842; }
  .ranking-item:nth-child(2) { background:#f5f5f5; border:1px solid #d1d5db; }
  .ranking-item:nth-child(3) { background:#fff4ed; border:1px solid #fed7aa; }
  .ranking-item:nth-child(n+4) { background:var(--cinza-bg); border:1px solid var(--cinza-borda); }
  .ranking-pos { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; width:28px; text-align:center; flex-shrink:0; }
  .ranking-nome { flex:1; font-weight:600; font-size:.88rem; }
  .ranking-placar { font-size:.78rem; color:var(--texto-sec); }
  .ranking-vazio { text-align:center; color:var(--texto-sec); font-size:.85rem; padding:1.5rem; }

  /* OVERLAY */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,39,118,.5); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:1rem; }
  .overlay.ativo { display:flex; }
  .spinner { width:40px; height:40px; border:4px solid rgba(255,255,255,.3); border-top-color:var(--amarelo); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .overlay-txt { color:white; font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:2px; }

  .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); background:#1a1a2e; color:white; padding:.65rem 1.25rem; border-radius:var(--radius); font-size:.85rem; z-index:1001; opacity:0; transition:opacity .3s; pointer-events:none; }
  .toast.show { opacity:1; }

  /* AO VIVO */
  .aovivo-card { background:var(--branco); border:2px solid var(--verde); border-radius:var(--radius-lg); padding:1.25rem; margin-bottom:1rem; position:relative; overflow:hidden; }
  .aovivo-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--verde),var(--amarelo),var(--verde)); }
  .aovivo-title { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--verde); letter-spacing:1px; margin-bottom:1rem; display:flex; align-items:center; gap:8px; }
  .aovivo-badge { font-size:.7rem; font-weight:700; padding:3px 10px; border-radius:20px; }
  .badge-live { background:#fee2e2; color:#dc2626; animation:pulse 1.5s infinite; }
  .badge-ft   { background:#f0fdf4; color:#15803d; }
  .badge-ns   { background:#f0f4ff; color:var(--azul); }
  .badge-ht   { background:#fff8e1; color:#7a5800; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .aovivo-placar { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px; margin-bottom:1rem; }
  .aovivo-time { display:flex; flex-direction:column; align-items:center; gap:5px; }
  .aovivo-flag { width:52px; height:auto; border-radius:5px; }
  .aovivo-nome { font-size:.82rem; font-weight:600; color:var(--texto); text-align:center; }
  .aovivo-gols { display:flex; align-items:center; gap:10px; justify-content:center; }
  .aovivo-num { font-family:'Bebas Neue',sans-serif; font-size:3rem; color:var(--azul); letter-spacing:3px; line-height:1; min-width:44px; text-align:center; }
  .aovivo-sep { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--texto-sec); }
  .aovivo-min { text-align:center; font-size:.78rem; color:var(--texto-sec); font-weight:600; margin-bottom:.75rem; }
  .aovivo-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .btn-importar { background:var(--azul); color:white; border:none; border-radius:var(--radius); padding:.6rem 1.2rem; font-family:'Bebas Neue',sans-serif; font-size:.95rem; letter-spacing:1.5px; cursor:pointer; display:flex; align-items:center; gap:6px; flex:1; justify-content:center; }
  .btn-importar:hover { opacity:.88; }
  .btn-importar:disabled { opacity:.45; cursor:not-allowed; }
  .btn-atualizar-live { background:var(--cinza-bg); border:1px solid var(--cinza-borda); color:var(--texto-sec); border-radius:var(--radius); padding:.6rem 1rem; font-family:'Barlow',sans-serif; font-size:.82rem; cursor:pointer; display:flex; align-items:center; gap:5px; }
  .btn-atualizar-live:hover { border-color:var(--verde); color:var(--verde); }
  .aovivo-msg { font-size:.78rem; color:var(--texto-sec); text-align:center; padding:.5rem; }
  .aovivo-loading { display:flex; align-items:center; justify-content:center; gap:8px; padding:1.5rem; color:var(--texto-sec); font-size:.85rem; }
  .aovivo-spinner { width:18px; height:18px; border:2px solid var(--cinza-borda); border-top-color:var(--verde); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }

  @media(max-width:600px) {
    .resumo-grid { grid-template-columns:repeat(3,1fr); gap:8px; }
    .resumo-card-val { font-size:1.4rem; }
    .tabela-header, .tabela-linha { grid-template-columns:1fr 70px 80px; }
    .tabela-header .col-whats, .tabela-linha .col-whats,
    .tabela-header .col-data, .tabela-linha .col-data { display:none; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">⚽</div>
    <div class="login-title">Painel Admin</div>
    <div class="login-sub">Bolão Copa 2026 · Acesso restrito</div>
    <input type="password" class="login-input" id="senha-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')entrar()">
    <button class="login-btn" onclick="entrar()">ENTRAR</button>
    <div class="login-erro" id="login-erro">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="admin-screen">
  <div class="topbar">
    <div class="topbar-title"><i class="ti ti-shield-check" style="font-size:20px"></i> Admin — Bolão Copa 2026</div>
    <div class="topbar-right">
      <button class="btn-atualizar" onclick="carregarDados()"><i class="ti ti-refresh" style="font-size:15px"></i> Atualizar</button>
      <button class="btn-sair" onclick="sair()"><i class="ti ti-logout" style="font-size:15px"></i> Sair</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- RESUMO -->
    <div class="resumo-grid">
      <div class="resumo-card">
        <div class="resumo-card-val val-verde" id="res-total">R$ --</div>
        <div class="resumo-card-lbl">💰 Total arrecadado</div>
      </div>
      <div class="resumo-card">
        <div class="resumo-card-val val-azul" id="res-palpites">--</div>
        <div class="resumo-card-lbl">⚽ Palpites</div>
      </div>
      <div class="resumo-card">
        <div class="resumo-card-val val-laranja" id="res-pendentes">--</div>
        <div class="resumo-card-lbl">⏳ Pendentes</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs" id="tabs"></div>

    <!-- CONTEÚDO -->
    <div id="conteudo-admin"></div>

  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-txt" id="overlay-txt">Carregando...</div>
</div>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxWZzuTN09Ta4nHDh0bp7_JwwDEqLwxPDfJJ3sElYrI0_PRNrRJTzluEfftxQTRjHtThQ/exec';
const SENHA = 'Fib@9482';

const JOGOS = [
  { idx:0, nome:'Brasil x Marrocos', time1:'Brasil',  time2:'Marrocos' },
  { idx:1, nome:'Brasil x Haiti',    time1:'Brasil',  time2:'Haiti'    },
  { idx:2, nome:'Escócia x Brasil',  time1:'Escócia', time2:'Brasil'   },
];

let dadosAdmin = null;
let jogoAtivo  = 0;

// ── Login ─────────────────────────────────────────────────────
function entrar() {
  const v = document.getElementById('senha-input').value;
  if (v === SENHA) {
    document.getElementById('login-screen').style.display  = 'none';
    document.getElementById('admin-screen').style.display  = 'block';
    carregarDados();
  } else {
    document.getElementById('login-erro').style.display = 'block';
    document.getElementById('senha-input').value = '';
    document.getElementById('senha-input').focus();
  }
}

function sair() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('senha-input').value = '';
  dadosAdmin = null;
}

// ── Carregar dados ────────────────────────────────────────────
async function carregarDados() {
  mostrarOverlay('Carregando dados...');
  try {
    const resp = await fetch(APPS_SCRIPT_URL + '?action=admin');
    const data = await resp.json();
    if (!data.sucesso) throw new Error(data.erro);
    dadosAdmin = data;
    renderAdmin();
  } catch(err) {
    toast('❌ Erro ao carregar: ' + err.message);
  } finally {
    ocultarOverlay();
  }
}

// ── Render principal ──────────────────────────────────────────
function renderAdmin() {
  const d = dadosAdmin;

  // Resumo
  document.getElementById('res-total').textContent    = 'R$ ' + parseFloat(d.totalPremio).toFixed(2).replace('.', ',');
  document.getElementById('res-palpites').textContent = d.totalPalpites;
  document.getElementById('res-pendentes').textContent = d.totalPendentes;

  // Tabs
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = JOGOS.map((j, i) =>
    `<div class="tab ${i===jogoAtivo?'ativo':''}" onclick="trocarJogo(${i})">${j.nome}</div>`
  ).join('') + `<div class="tab ${jogoAtivo===3?'ativo':''}" onclick="trocarJogo(3)">🏆 Ranking</div>` + `<div class="tab ${jogoAtivo===4?'ativo':''}" onclick="trocarJogo(4)">🔴 Ao Vivo</div>`;

  renderConteudo();
}

// trocarJogo definido abaixo (ao vivo)

function renderConteudo() {
  const cont = document.getElementById('conteudo-admin');
  if (jogoAtivo === 3) { renderRanking(cont); return; }
  if (jogoAtivo === 4) { renderAoVivo(cont); return; }

  const jogo    = JOGOS[jogoAtivo];
  const palpites = (dadosAdmin.palpites || [])[jogoAtivo] || { itens: [] };
  const resultado = (dadosAdmin.resultados || [])[jogoAtivo] || {};

  // Confirmados e pendentes
  const confirmados = palpites.itens.filter(p => p.pgto === 'sim').length;
  const pendentes   = palpites.itens.filter(p => p.pgto !== 'sim').length;

  cont.innerHTML = `
    <!-- LANÇAR RESULTADO -->
    <div class="resultado-card">
      <div class="resultado-title"><i class="ti ti-pencil" style="font-size:18px;color:var(--verde)"></i>Lançar Resultado — ${jogo.nome}</div>
      <div class="resultado-row">
        <div class="resultado-time">${jogo.time1}</div>
        <div class="resultado-inputs">
          <input type="number" class="res-input" id="res1-${jogoAtivo}" min="0" max="20" value="${resultado.g1 !== undefined ? resultado.g1 : ''}" placeholder="0">
          <span class="res-sep">×</span>
          <input type="number" class="res-input" id="res2-${jogoAtivo}" min="0" max="20" value="${resultado.g2 !== undefined ? resultado.g2 : ''}" placeholder="0">
        </div>
        <div class="resultado-time">${jogo.time2}</div>
      </div>
      ${resultado.g1 !== undefined ? `<div class="resultado-atual">✅ Resultado atual: <strong>${resultado.g1} × ${resultado.g2}</strong></div>` : ''}
      <button class="btn-salvar-resultado" onclick="salvarResultado(${jogoAtivo})">
        <i class="ti ti-device-floppy" style="font-size:16px"></i> SALVAR RESULTADO
      </button>
    </div>

    <!-- PALPITES -->
    <div class="tabela-card">
      <div class="tabela-header">
        <div>Nome</div>
        <div class="col-whats">WhatsApp</div>
        <div>Palpite</div>
        <div>Comprovante</div>
        <div>Pagamento</div>
      </div>
      ${palpites.itens.length === 0
        ? `<div class="tabela-vazio">Nenhum palpite para este jogo ainda.</div>`
        : palpites.itens.map((p, i) => `
          <div class="tabela-linha">
            <div><strong>${p.nome}</strong><br><span style="font-size:.72rem;color:var(--texto-sec)">${p.codigo}</span></div>
            <div class="col-whats" style="font-size:.78rem;color:var(--texto-sec)">${p.whats}</div>
            <div><span class="placar-badge">${p.g1} × ${p.g2}</span></div>
            <div><span class="badge badge-${p.comp === 'Pendente' ? 'pendente' : 'confirmado'}">${p.comp}</span></div>
            <div>
              ${p.pgto === 'sim'
                ? `<span class="badge badge-confirmado">✅ Confirmado</span>
                   <button class="btn-estornar" onclick="alterarPgto(${jogoAtivo},${i},'nao')" style="margin-top:3px">Estornar</button>`
                : `<button class="btn-confirmar-pgto" onclick="alterarPgto(${jogoAtivo},${i},'sim')">✅ Confirmar</button>`
              }
            </div>
          </div>`).join('')
      }
    </div>
    <div style="font-size:.78rem;color:var(--texto-sec);text-align:right;margin-top:-6px;margin-bottom:1rem">
      ✅ ${confirmados} confirmado(s) · ⏳ ${pendentes} pendente(s)
    </div>
  `;
}

function renderRanking(cont) {
  const ranking = dadosAdmin.ranking || [];
  if (ranking.length === 0) {
    cont.innerHTML = `<div class="ranking-card"><div class="ranking-vazio">Nenhum resultado lançado ainda.</div></div>`;
    return;
  }

  cont.innerHTML = ranking.map(jogo => {
    const itens = (jogo.acertaram || []).length === 0
      ? `<div class="ranking-vazio">Ninguém acertou — prêmio acumula!</div>`
      : jogo.acertaram.map((a, i) => `
          <div class="ranking-item">
            <div class="ranking-pos">${['🥇','🥈','🥉'][i] || (i+1)}</div>
            <div><div class="ranking-nome">${a.nome}</div><div class="ranking-placar">Palpite: ${a.p1} × ${a.p2}</div></div>
          </div>`).join('');
    return `
      <div class="ranking-card">
        <div class="ranking-title"><i class="ti ti-trophy" style="font-size:18px;color:var(--amarelo)"></i>${jogo.jogo} · ${jogo.resultado}</div>
        ${itens}
      </div>`;
  }).join('');
}

// ── Confirmar / estornar pagamento ────────────────────────────
async function alterarPgto(jogoIdx, itemIdx, status) {
  const item = dadosAdmin.palpites[jogoIdx].itens[itemIdx];
  mostrarOverlay(status === 'sim' ? 'Confirmando pagamento...' : 'Estornando...');
  try {
    await enviarBeacon(`action=pgto&jogoIndex=${jogoIdx}&codigo=${encodeURIComponent(item.codigo)}&status=${status}`);
    item.pgto = status;
    renderAdmin();
    toast(status === 'sim' ? '✅ Pagamento confirmado!' : '↩️ Pagamento estornado.');
  } catch(err) {
    toast('❌ Erro: ' + err.message);
  } finally {
    ocultarOverlay();
  }
}

// ── Salvar resultado ──────────────────────────────────────────
async function salvarResultado(jogoIdx) {
  const g1 = document.getElementById(`res1-${jogoIdx}`).value;
  const g2 = document.getElementById(`res2-${jogoIdx}`).value;
  if (g1 === '' || g2 === '') { toast('⚽ Preencha o placar antes de salvar.'); return; }
  mostrarOverlay('Salvando resultado...');
  try {
    await enviarBeacon(`action=resultado&jogoIndex=${jogoIdx}&g1=${g1}&g2=${g2}`);
    if (!dadosAdmin.resultados) dadosAdmin.resultados = [];
    dadosAdmin.resultados[jogoIdx] = { g1: parseInt(g1), g2: parseInt(g2) };
    await carregarDados();
    toast('✅ Resultado salvo e ranking atualizado!');
  } catch(err) {
    toast('❌ Erro: ' + err.message);
  } finally {
    ocultarOverlay();
  }
}

// ── AO VIVO — via cache do Apps Script (sem consumir cota da API) ──

const JOGOS_FLAGS = {
  'Brasil':   'https://flagcdn.com/w80/br.png',
  'Marrocos': 'https://flagcdn.com/w80/ma.png',
  'Haiti':    'https://flagcdn.com/w80/ht.png',
  'Escócia':  'https://flagcdn.com/w80/gb-sct.png',
};

const FIXTURE_IDS_LIVE = {
  0: null, // Brasil x Marrocos — preencher após confirmar na API
  1: null, // Brasil x Haiti
  2: null, // Escócia x Brasil
};

let liveData = null;
let liveTimer = null;

function renderAoVivo(cont) {
  cont.innerHTML = `
    <div class="aovivo-card" id="aovivo-card">
      <div class="aovivo-title" style="justify-content:space-between">
        <span><i class="ti ti-broadcast" style="font-size:18px"></i> Placar Ao Vivo — API Football</span>
        <button class="btn-atualizar-live" onclick="buscarLive(true)">
          <i class="ti ti-refresh" style="font-size:14px"></i> Atualizar
        </button>
      </div>

      <!-- Seletor de jogo -->
      <div style="display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap">
        ${JOGOS.map((j,i) => `<button onclick="selecionarJogoLive(${i})" id="btn-live-${i}"
          style="padding:5px 12px;border-radius:var(--radius);font-size:.8rem;font-weight:600;cursor:pointer;border:1.5px solid var(--cinza-borda);background:var(--cinza-bg);color:var(--texto-sec);font-family:Barlow,sans-serif;transition:all .15s"
          >${j.nome}</button>`).join('')}
      </div>

      <div id="live-conteudo">
        <div class="aovivo-loading">
          <div class="aovivo-spinner"></div> Buscando placar...
        </div>
      </div>
    </div>

    <!-- LANÇAR RESULTADO RÁPIDO -->
    <div class="resultado-card" id="resultado-rapido" style="display:none">
      <div class="resultado-title"><i class="ti ti-device-floppy" style="font-size:18px;color:var(--verde)"></i>Gravar Resultado</div>
      <div class="resultado-row">
        <div class="resultado-time" id="rr-time1">—</div>
        <div class="resultado-inputs">
          <input type="number" class="res-input" id="rr-g1" min="0" max="20" placeholder="0">
          <span class="res-sep">×</span>
          <input type="number" class="res-input" id="rr-g2" min="0" max="20" placeholder="0">
        </div>
        <div class="resultado-time" id="rr-time2">—</div>
      </div>
      <div style="display:flex;gap:8px;margin-top:.5rem">
        <button class="btn-salvar-resultado" style="flex:1" id="rr-btn-salvar" onclick="gravarResultadoRapido()">
          <i class="ti ti-device-floppy" style="font-size:16px"></i> GRAVAR RESULTADO
        </button>
      </div>
      <div class="resultado-atual" id="rr-resultado-atual" style="margin-top:.5rem"></div>
    </div>
  `;

  jogoLiveAtivo = 0;
  atualizarBotoesLive();
  buscarLive(true);

  // Auto-refresh a cada 60s enquanto na aba
  if (liveTimer) clearInterval(liveTimer);
  liveTimer = setInterval(() => {
    if (jogoAtivo === 4) buscarLive(false);
  }, 60000);
}

let jogoLiveAtivo = 0;

function selecionarJogoLive(idx) {
  jogoLiveAtivo = idx;
  atualizarBotoesLive();
  buscarLive(true);
}

function atualizarBotoesLive() {
  JOGOS.forEach((_, i) => {
    const btn = document.getElementById(`btn-live-${i}`);
    if (!btn) return;
    if (i === jogoLiveAtivo) {
      btn.style.background = 'var(--azul)';
      btn.style.color = 'white';
      btn.style.borderColor = 'var(--azul)';
    } else {
      btn.style.background = 'var(--cinza-bg)';
      btn.style.color = 'var(--texto-sec)';
      btn.style.borderColor = 'var(--cinza-borda)';
    }
  });
}

async function buscarLive(mostrarLoading) {
  const cont = document.getElementById('live-conteudo');
  if (!cont) return;

  if (mostrarLoading) {
    cont.innerHTML = '<div class="aovivo-loading"><div class="aovivo-spinner"></div> Buscando placar do cache...</div>';
  }

  try {
    // Busca do cache do Apps Script — não consome cota da API
    const resp = await fetch(APPS_SCRIPT_URL + '?action=placarcache');
    const data = await resp.json();

    if (!data.ativo) {
      cont.innerHTML = `<div class="aovivo-msg">
        ⏳ Nenhum jogo acontecendo agora.<br>
        <span style="font-size:.75rem;color:var(--texto-sec)">
          O cache atualiza automaticamente quando um jogo começa.<br>
          Certifique-se que o trigger está instalado no Apps Script.
        </span>
      </div>`;
      renderResultadoRapido(null);
      return;
    }

    // Se o cache tem dados de um jogo diferente do selecionado, avisa
    if (data.jogoIdx !== undefined && data.jogoIdx !== jogoLiveAtivo) {
      cont.innerHTML = `<div class="aovivo-msg">
        ℹ️ O cache está mostrando <strong>${JOGOS[data.jogoIdx]?.nome}</strong>.<br>
        <span style="font-size:.75rem">Selecione o jogo correto acima ou aguarde o início do jogo selecionado.</span>
      </div>`;
    }

    // Monta objeto no formato esperado pelo renderLiveCard
    const fixture = {
      fixture: {
        id: data.fixtureId,
        status: { short: data.status, elapsed: data.elapsed }
      },
      teams: {
        home: { name: data.home?.name, logo: data.home?.logo },
        away: { name: data.away?.name, logo: data.away?.logo }
      },
      goals: {
        home: data.home?.goals,
        away: data.away?.goals
      },
      score: {
        halftime: { home: data.halftime?.home, away: data.halftime?.away }
      }
    };

    if (data.erro) {
      cont.innerHTML = `<div class="aovivo-msg" style="color:var(--laranja)">
        ⚠️ Cache com erro: ${data.erro}<br>
        <span style="font-size:.75rem">Atualizado: ${data.atualizado ? new Date(data.atualizado).toLocaleTimeString('pt-BR') : '—'}</span>
      </div>`;
      return;
    }

    liveData = { fixture, jogoIdx: data.jogoIdx ?? jogoLiveAtivo };
    renderLiveCard(cont, fixture, data.atualizado);
    renderResultadoRapido(fixture);

  } catch(err) {
    cont.innerHTML = `<div class="aovivo-msg" style="color:var(--vermelho)">❌ Erro ao buscar cache: ${err.message}</div>`;
  }
}

function renderLiveCard(cont, fixture, atualizado) {
  const status = fixture.fixture.status.short;
  const elapsed = fixture.fixture.status.elapsed;
  const teams = fixture.teams;
  const goals = fixture.goals;
  const score = fixture.score;

  const statusTexto = {
    'NS': 'NÃO INICIADO', '1H': `${elapsed || '?'}' · 1º TEMPO`,
    'HT': 'INTERVALO', '2H': `${elapsed || '?'}' · 2º TEMPO`,
    'FT': 'ENCERRADO', 'ET': `${elapsed || '?'}' · PRORROGAÇÃO`,
    'P': 'PÊNALTIS', 'AET': 'ENCERRADO (PRORR.)', 'PEN': 'ENCERRADO (PEN.)'
  };

  const badgeClass = status === 'FT' || status === 'AET' || status === 'PEN' ? 'badge-ft'
    : status === 'NS' ? 'badge-ns'
    : status === 'HT' ? 'badge-ht'
    : 'badge-live';

  const flag1 = JOGOS_FLAGS[teams.home.name] || teams.home.logo;
  const flag2 = JOGOS_FLAGS[teams.away.name] || teams.away.logo;

  const g1 = goals.home !== null ? goals.home : '-';
  const g2 = goals.away !== null ? goals.away : '-';
  const htScore = score.halftime.home !== null ? `Intervalo: ${score.halftime.home} × ${score.halftime.away}` : '';

  const podeImportar = (status !== 'NS') && goals.home !== null;

  cont.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:.75rem">
      <span class="aovivo-badge ${badgeClass}">${statusTexto[status] || status}</span>
      ${htScore ? `<span style="font-size:.72rem;color:var(--texto-sec)">${htScore}</span>` : ''}
    </div>
    <div class="aovivo-placar">
      <div class="aovivo-time">
        <img src="${flag1}" class="aovivo-flag" alt="" onerror="this.src='${teams.home.logo}'">
        <div class="aovivo-nome">${teams.home.name}</div>
      </div>
      <div>
        <div class="aovivo-gols">
          <div class="aovivo-num">${g1}</div>
          <div class="aovivo-sep">×</div>
          <div class="aovivo-num">${g2}</div>
        </div>
      </div>
      <div class="aovivo-time">
        <img src="${flag2}" class="aovivo-flag" alt="" onerror="this.src='${teams.away.logo}'">
        <div class="aovivo-nome">${teams.away.name}</div>
      </div>
    </div>
    ${elapsed ? `<div class="aovivo-min">⏱ ${elapsed}'</div>` : ''}
    <div class="aovivo-actions">
      <button class="btn-importar" ${podeImportar ? '' : 'disabled'}
        onclick="importarPlacar(${goals.home}, ${goals.away}, '${teams.home.name}', '${teams.away.name}')">
        <i class="ti ti-arrow-down" style="font-size:16px"></i>
        ${podeImportar ? '↓ USAR ESTE PLACAR' : 'AGUARDANDO INÍCIO'}
      </button>
    </div>
    <div style="font-size:.7rem;color:var(--texto-sec);margin-top:.5rem;text-align:center">
      🔄 Cache atualizado: ${atualizado ? new Date(atualizado).toLocaleTimeString('pt-BR') : new Date().toLocaleTimeString('pt-BR')} · Via Apps Script
    </div>
  `;
}

function importarPlacar(g1, g2, time1, time2) {
  // Preenche o card de gravar resultado
  const el1 = document.getElementById('rr-g1');
  const el2 = document.getElementById('rr-g2');
  if (!el1 || !el2) return;
  el1.value = g1;
  el2.value = g2;
  document.getElementById('resultado-rapido').style.display = 'block';
  document.getElementById('resultado-rapido').scrollIntoView({ behavior:'smooth' });

  // Flash visual
  [el1, el2].forEach(el => {
    el.style.borderColor = 'var(--verde)';
    setTimeout(() => el.style.borderColor = '', 1500);
  });
  toast(`✅ Placar ${g1} × ${g2} importado — confirme para gravar.`);
}

function renderResultadoRapido(fixture) {
  const card = document.getElementById('resultado-rapido');
  if (!card) return;
  const jogo = JOGOS[jogoLiveAtivo];
  document.getElementById('rr-time1').textContent = jogo.time1;
  document.getElementById('rr-time2').textContent = jogo.time2;

  const resultado = (dadosAdmin?.resultados || [])[jogoLiveAtivo];
  const atualEl = document.getElementById('rr-resultado-atual');
  if (resultado && resultado.g1 !== undefined) {
    atualEl.innerHTML = `✅ Resultado atual gravado: <strong>${resultado.g1} × ${resultado.g2}</strong>`;
  } else {
    atualEl.innerHTML = '';
  }
}

async function gravarResultadoRapido() {
  const g1 = document.getElementById('rr-g1').value;
  const g2 = document.getElementById('rr-g2').value;
  if (g1 === '' || g2 === '') { toast('⚽ Preencha o placar antes de gravar.'); return; }

  const btn = document.getElementById('rr-btn-salvar');
  btn.disabled = true;
  mostrarOverlay('Gravando resultado...');
  try {
    await enviarBeacon(`action=resultado&jogoIndex=${jogoLiveAtivo}&g1=${g1}&g2=${g2}`);
    if (!dadosAdmin.resultados) dadosAdmin.resultados = [];
    dadosAdmin.resultados[jogoLiveAtivo] = { g1: parseInt(g1), g2: parseInt(g2) };
    toast(`✅ Resultado ${g1} × ${g2} gravado com sucesso!`);
    renderResultadoRapido(null);
    await carregarDados();
    // Volta pra aba ao vivo
    jogoAtivo = 4;
    renderAdmin();
  } catch(err) {
    toast('❌ Erro: ' + err.message);
  } finally {
    ocultarOverlay();
    if (btn) btn.disabled = false;
  }
}

// Limpar timer ao trocar de aba
const _trocarJogoOrig = trocarJogo;
function trocarJogo(idx) {
  if (idx !== 4 && liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  jogoAtivo = idx;
  renderAdmin();
}

// ── Image beacon (cross-origin write) ────────────────────────
function enviarBeacon(params) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = img.onerror = () => resolve();
    img.src = APPS_SCRIPT_URL + '?' + params;
    setTimeout(resolve, 5000);
  });
}

// ── UI helpers ────────────────────────────────────────────────
function mostrarOverlay(txt) {
  document.getElementById('overlay-txt').textContent = txt;
  document.getElementById('overlay').classList.add('ativo');
}
function ocultarOverlay() { document.getElementById('overlay').classList.remove('ativo'); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
